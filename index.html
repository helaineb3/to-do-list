<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weekly to-dos</title>
  </head>
  <body>
    <div id="app">
      <main class="todo-app">
        <header class="todo-header">
          <h1 class="todo-title">weekly to-dos</h1>
          <div class="todo-auth-user" id="todo-auth-user" hidden>
            <span class="todo-auth-email" id="todo-auth-email"></span>
            <button type="button" class="btn btn--header" id="todo-sign-out-button">
              Sign out
            </button>
          </div>
        </header>

        <section class="todo-auth" id="todo-auth-section" hidden>
          <div class="tabs">
            <button
              type="button"
              class="tab is-active"
              id="todo-auth-tab-sign-in"
              data-auth-tab="sign-in"
            >
              Sign in
            </button>
            <button
              type="button"
              class="tab"
              id="todo-auth-tab-sign-up"
              data-auth-tab="sign-up"
            >
              Create account
            </button>
          </div>

          <form class="todo-auth-form" id="todo-sign-in-form">
            <input
              type="email"
              id="todo-sign-in-email"
              class="todo-input"
              name="email"
              placeholder="Email"
              autocomplete="email"
              required
              aria-label="Email"
            />
            <input
              type="password"
              id="todo-sign-in-password"
              class="todo-input"
              name="password"
              placeholder="Password"
              autocomplete="current-password"
              required
              aria-label="Password"
            />
            <button type="submit" class="btn btn--primary">Sign in</button>
          </form>

          <form class="todo-auth-form" id="todo-sign-up-form" hidden>
            <input
              type="email"
              id="todo-sign-up-email"
              class="todo-input"
              name="email"
              placeholder="Email"
              autocomplete="email"
              required
              aria-label="Email"
            />
            <input
              type="password"
              id="todo-sign-up-password"
              class="todo-input"
              name="password"
              placeholder="Password"
              autocomplete="new-password"
              required
              aria-label="Password"
            />
            <button type="submit" class="btn btn--primary">Create account</button>
          </form>
        </section>

        <section class="calendar-week" id="calendar-section" aria-label="Calendar">
          <div class="calendar-nav">
            <button type="button" class="btn btn--ghost" id="calendar-prev" aria-label="Previous">
              ←
            </button>
            <p class="badge calendar-range" id="calendar-range"></p>
            <button type="button" class="btn btn--ghost" id="calendar-next" aria-label="Next">
              →
            </button>
          </div>
          <div class="tabs" role="tablist" aria-label="Calendar view">
            <button
              type="button"
              class="tab"
              id="calendar-view-day"
              data-calendar-view="day"
              role="tab"
              aria-selected="false"
            >
              Day
            </button>
            <button
              type="button"
              class="tab is-active"
              id="calendar-view-week"
              data-calendar-view="week"
              role="tab"
              aria-selected="true"
            >
              Week
            </button>
            <button
              type="button"
              class="tab"
              id="calendar-view-month"
              data-calendar-view="month"
              role="tab"
              aria-selected="false"
            >
              Month
            </button>
          </div>
          <div class="calendar-weekdays" id="calendar-weekdays" hidden></div>
          <div class="calendar-days" id="calendar-days"></div>
        </section>

        <section class="day-panel" id="day-panel">
          <header class="day-panel-header">
            <div class="day-panel-heading">
              <h2 class="day-panel-title" id="day-panel-title"></h2>
              <button
                type="button"
                class="day-closed-badge"
                id="day-closed-badge"
                hidden
                title="Hover to reopen"
              >
                <span class="day-closed-badge-label">Closed</span>
                <span class="day-closed-badge-reopen">Reopen</span>
              </button>
            </div>
            <button type="button" class="btn btn--primary day-close-trigger" id="close-day-button">
              Close day
            </button>
          </header>

          <div class="day-reflection-display" id="day-reflection-display" hidden>
            <p class="day-reflection-label">Reflection</p>
            <p class="day-reflection-text" id="day-reflection-text"></p>
          </div>

          <section class="close-day-panel" id="close-day-panel" hidden>
            <h3 class="close-day-title">Close out this day</h3>
            <label class="close-day-label" for="close-day-reflection">Reflection</label>
            <textarea
              id="close-day-reflection"
              class="close-day-reflection"
              rows="4"
              placeholder="What happened today? What do you want to remember?"
            ></textarea>
            <div class="close-day-push" id="close-day-push-section" hidden>
              <p class="close-day-label">Push to tomorrow</p>
              <ul class="close-day-push-list" id="close-day-push-list"></ul>
            </div>
            <div class="close-day-actions">
              <button type="button" class="btn btn--primary" id="close-day-confirm">Close day</button>
              <button type="button" class="btn btn--ghost" id="close-day-cancel">Cancel</button>
            </div>
          </section>

        <form class="todo-form" id="todo-form">
          <input
            type="text"
            id="todo-input"
            class="todo-input"
            name="todo"
            placeholder="What needs doing?"
            autocomplete="off"
            aria-label="New todo"
          />
          <button type="submit" class="btn btn--primary">Add</button>
        </form>

        <p class="todo-error" id="todo-error" hidden></p>

        <ul class="todo-list" id="todo-list"></ul>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
