<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todo-list-app</title>
  </head>
  <body>
    <div id="app">
      <main class="todo-app">
        <header class="todo-header">
          <h1 class="todo-title">Todos</h1>
          <div class="todo-auth-user" id="todo-auth-user" hidden>
            <span class="todo-auth-email" id="todo-auth-email"></span>
            <button type="button" class="todo-sign-out-button" id="todo-sign-out-button">
              Sign out
            </button>
          </div>
        </header>

        <section class="todo-auth" id="todo-auth-section" hidden>
          <div class="todo-auth-tabs">
            <button
              type="button"
              class="todo-auth-tab is-active"
              id="todo-auth-tab-sign-in"
              data-auth-tab="sign-in"
            >
              Sign in
            </button>
            <button
              type="button"
              class="todo-auth-tab"
              id="todo-auth-tab-sign-up"
              data-auth-tab="sign-up"
            >
              Create account
            </button>
          </div>

          <form class="todo-auth-form" id="todo-sign-in-form">
            <input
              type="email"
              id="todo-sign-in-email"
              class="todo-input"
              name="email"
              placeholder="Email"
              autocomplete="email"
              required
              aria-label="Email"
            />
            <input
              type="password"
              id="todo-sign-in-password"
              class="todo-input"
              name="password"
              placeholder="Password"
              autocomplete="current-password"
              required
              aria-label="Password"
            />
            <button type="submit" class="todo-add-button">Sign in</button>
          </form>

          <form class="todo-auth-form" id="todo-sign-up-form" hidden>
            <input
              type="email"
              id="todo-sign-up-email"
              class="todo-input"
              name="email"
              placeholder="Email"
              autocomplete="email"
              required
              aria-label="Email"
            />
            <input
              type="password"
              id="todo-sign-up-password"
              class="todo-input"
              name="password"
              placeholder="Password"
              autocomplete="new-password"
              required
              aria-label="Password"
            />
            <button type="submit" class="todo-add-button">Create account</button>
          </form>
        </section>

        <form class="todo-form" id="todo-form">
          <input
            type="text"
            id="todo-input"
            class="todo-input"
            name="todo"
            placeholder="What needs doing?"
            autocomplete="off"
            aria-label="New todo"
          />
          <button type="submit" class="todo-add-button">Add</button>
        </form>

        <p class="todo-error" id="todo-error" hidden></p>

        <ul class="todo-list" id="todo-list"></ul>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
